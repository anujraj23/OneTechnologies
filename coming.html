<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Games Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Orbitron;
}

/* BODY */

body{

height:100vh;

background:#000;

color:white;

overflow:hidden;

display:flex;

align-items:center;

justify-content:center;

}

/* STAR BACKGROUND */

body::before{

content:"";

position:absolute;

width:300%;

height:300%;

background-image:radial-gradient(white 1px,transparent 1px);

background-size:60px 60px;

animation:stars 120s linear infinite;

opacity:0.3;

}

@keyframes stars{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-2000px);
}

}

/* CONTAINER */

.container{

position:relative;

z-index:2;

text-align:center;

width:90%;

}

/* TITLE */

.title{

font-size:80px;

margin-bottom:70px;

letter-spacing:6px;

text-shadow:

0 0 20px #ffffff,

0 0 40px #ffffff,

0 0 100px #ffffff;

animation:glow 3s infinite alternate;

}

@keyframes glow{

from{
transform:scale(1);
}

to{
transform:scale(1.05);
}

}

/* GAME GRID */

.games{

display:grid;

grid-template-columns:repeat(auto-fit,260px);

gap:40px;

justify-content:center;

}

/* GAME CARD */

.card{

height:200px;

border-radius:18px;

background:linear-gradient(145deg,#111,#000);

display:flex;

align-items:center;

justify-content:center;

font-size:26px;

cursor:pointer;

position:relative;

transition:0.4s;

box-shadow:

0 0 25px rgba(0, 247, 255, 0.5),

inset 0 0 20px rgba(255, 255, 255, 0.3);

}

/* GLOW BORDER */

.card::before{

content:"";

position:absolute;

inset:-2px;

border-radius:18px;

background:linear-gradient(0deg,#ffffff,#ffffff,#ffffff);

filter:blur(1000px);

opacity:0;

transition:0.4s;

}

.card:hover::before{

opacity:1;

}

/* HOVER EFFECT */

.card:hover{

transform:translateY(-15px) scale(1.08);

box-shadow:

0 0 50px #ffffff,

0 0 90px #ffffff;

}

/* FLOATING PLANETS */

.planet{

position:absolute;

border-radius:50%;

opacity:0.6;

filter:blur(2px);

animation:float 40s linear infinite;

}

.planet1{

width:140px;

height:140px;

background:radial-gradient(circle,#00ffff,#ffffff);

top:10%;

left:8%;

}

.planet2{

width:180px;

height:180px;

background:radial-gradient(circle,#ff00cc,#330033);

bottom:10%;

right:10%;

}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-40px);
}

100%{
transform:translateY(0);
}

}

/* PARTICLES */

canvas{

position:absolute;

top:0;

left:0;

pointer-events:none;

}

</style>

</head>

<body>

<div class="planet planet1"></div>

<script>

/* PARTICLE SYSTEM */

let canvas=document.getElementById("particles");

let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*3,

speed:Math.random()*0.5

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

ctx.fill();

p.y-=p.speed;

if(p.y<0){

p.y=canvas.height;

p.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
