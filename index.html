```html
<!DOCTYPE html>
<html>
<head>
<title>Mini Games</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

background:linear-gradient(180deg,#e6cfa0,#caa96a);

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}

/* main container */

.container{

width:90%;

height:85vh;

background:radial-gradient(circle,#2b0c05,#050505);

border-radius:12px;

box-shadow:0 40px 80px rgba(0,0,0,0.6);

position:relative;

overflow:hidden;

}

/* navbar */

.navbar{

position:absolute;

top:30px;

left:40px;

right:40px;

display:flex;

justify-content:space-between;

color:white;

}

.menu{

display:flex;

gap:40px;

font-size:14px;

}

.contact{

background:#ff3c1f;

padding:10px 18px;

border-radius:6px;

font-size:13px;

}

/* 3D circle button */

.circleButton{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:260px;

height:260px;

border-radius:50%;

background:radial-gradient(circle,#ff8a00,#ff0055,#c300ff);

display:flex;

align-items:center;

justify-content:center;

font-size:32px;

color:white;

cursor:pointer;

box-shadow:

0 0 80px #ff0055,

0 0 120px #ffffff;

transition:0.4s;

}

.circleButton:hover{

transform:translate(-50%,-50%) scale(1.15);

box-shadow:

0 0 120px #ff0055,

0 0 180px #ffffff;

}

/* footer */

.footer{

position:absolute;

bottom:35px;

left:50%;

transform:translateX(-50%);

color:#aaa;

font-size:12px;

}

</style>

</head>

<body>

<div class="container">

<div class="navbar">

<div>● FANCY</div>

<div class="menu">

<div>SERVICES</div>
<div>SOLUTIONS</div>
<div>CAREER</div>
<div>COMPANY</div>
<div>BLOG</div>

</div>

<div class="contact">CONTACT US</div>

</div>

<a href="coming.html">

<div class="circleButton">

BEGIN

</div>

</a>

<div class="footer">

WELCOME TO MINI GAMES WORLD


</div>

</div>

</body>
</html>
```
